<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fullscreen Video</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      background: #000;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #myVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* Контейнер достижения */
    .achievement {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out, glow 2s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .achievement:hover {
      transform: scale(1.05);
      background: rgba(0, 0, 0, 0.85);
    }

    .achievement-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: linear-gradient(135deg, #ffd700, #ffb347);
      padding: 3px;
    }

    .achievement-icon img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #1a1a2e;
    }

    .achievement-content {
      display: flex;
      flex-direction: column;
    }

    .achievement-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 215, 0, 0.8);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .achievement-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .achievement-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes glow {
      0% {
        border-color: rgba(255, 215, 0, 0.3);
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.2);
      }
      50% {
        border-color: rgba(255, 215, 0, 0.8);
        box-shadow: 0 0 15px 2px rgba(255, 215, 0, 0.4);
      }
      100% {
        border-color: rgba(255, 215, 0, 0.3);
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.2);
      }
    }

    /* Мобильная адаптация */
    @media (max-width: 480px) {
      .achievement {
        top: 12px;
        right: 12px;
        padding: 8px 14px;
        gap: 8px;
      }
      
      .achievement-icon {
        width: 32px;
        height: 32px;
      }
      
      .achievement-text {
        font-size: 12px;
        white-space: normal;
        max-width: 180px;
      }
      
      .achievement-sub {
        font-size: 9px;
      }
      
      .achievement-title {
        font-size: 10px;
      }
    }

    /* Кнопка звука */
    .sound-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      display: none;
    }

    .sound-btn:hover {
      background: rgba(0, 0, 0, 0.9);
      transform: scale(1.05);
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      z-index: 20;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      width: fit-content;
      margin: 0 auto;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      display: none;
    }
  </style>
</head>
<body>

<div class="video-container">
  <video id="myVideo" muted loop playsinline disablePictureInPicture preload="auto">
    <source src="secretvideo.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео.
  </video>
</div>

<!-- Контейнер достижения -->
<div class="achievement" id="achievement">
  <div class="achievement-icon">
    <img src="fizhma.png" alt="Фижма" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ffd700%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2248%22 font-weight=%22bold%22%3EФ%3C/text%3E%3C/svg%3E'">
  </div>
  <div class="achievement-content">
    <span class="achievement-title">🏆 ДОСТИЖЕНИЕ ПОЛУЧЕНО</span>
    <span class="achievement-text">Фижма</span>
    <span class="achievement-sub">"Какая ещё ФИЖМА!"</span>
  </div>
</div>

<button class="sound-btn" id="soundBtn">🔊 Включить звук</button>
<div class="hint" id="hint">🔊 Нажмите в любом месте для включения звука</div>

<script>
  const video = document.getElementById('myVideo');
  const soundBtn = document.getElementById('soundBtn');
  const hint = document.getElementById('hint');
  const achievement = document.getElementById('achievement');
  let soundEnabled = false;

  // Анимация появления достижения при клике (опционально)
  if (achievement) {
    achievement.addEventListener('click', () => {
      achievement.style.transform = 'scale(1.1)';
      setTimeout(() => {
        achievement.style.transform = '';
      }, 200);
    });
  }

  // Функция включения звука
  function enableSound() {
    if (soundEnabled) return;
    
    video.muted = false;
    video.play().then(() => {
      soundEnabled = true;
      console.log('Звук включен');
      
      // Скрываем кнопку и подсказку
      soundBtn.style.display = 'none';
      hint.style.display = 'none';
    }).catch(e => {
      console.log('Не удалось включить звук автоматически:', e);
      // Показываем кнопку для ручного включения
      soundBtn.style.display = 'block';
      hint.style.display = 'block';
    });
  }

  // Попытка включить звук сразу при загрузке страницы
  document.addEventListener('DOMContentLoaded', () => {
    // Сначала запускаем видео в muted режиме
    video.play().catch(e => console.log('Ожидание взаимодействия'));
    
    // Пытаемся включить звук
    setTimeout(() => {
      enableSound();
    }, 100);
  });

  // Если автоматически не получилось, ждем клика пользователя
  function handleUserInteraction() {
    if (!soundEnabled) {
      enableSound();
    }
    // Удаляем обработчики после успешного включения
    if (soundEnabled) {
      document.removeEventListener('click', handleUserInteraction);
      document.removeEventListener('touchstart', handleUserInteraction);
    }
  }

  document.addEventListener('click', handleUserInteraction);
  document.addEventListener('touchstart', handleUserInteraction);

  // Запрещаем паузу
  video.addEventListener('pause', (e) => {
    if (video.paused && !video.ended) {
      e.preventDefault();
      video.play().catch(e => console.log('Playback prevented:', e));
    }
  });

  // Блокируем контекстное меню
  video.addEventListener('contextmenu', (e) => {
    e.preventDefault();
  });

  // Дополнительная защита от остановки
  setInterval(() => {
    if (video && video.paused && !video.ended) {
      video.play().catch(e => console.log('Interval restart failed:', e));
    }
  }, 500);

  // Обработчик для кнопки включения звука
  soundBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    enableSound();
  });
</script>

</body>
</html>
